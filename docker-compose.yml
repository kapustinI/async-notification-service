version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: notifications_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: notifications_redis
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD","redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build: .
    container_name: notification_api
    command: flask --app app:create_app run --host=0.0.0.0 --port=8000
    env_file:
      - .env
    ports:
      - "${APP_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy 
  worker:
    build: .
    container_name: notification_worker
    command: celery -A app.tasks:celery worker --loglevel=INFO
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
volumes:
  postgres_data:
